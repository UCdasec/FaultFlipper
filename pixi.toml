[workspace]
authors = ["ESPR3SS0 <98864173+ESPR3SS0@users.noreply.github.com>"]
channels = ["conda-forge"]
description = "Add a short description here"
name = "FaultFlipper"
platforms = ["linux-64"]
version = "0.1.0"



[dependencies]
python = ">=3.13.1,<4"
cyclopts = ">=3.1.2,<4"
capstone = ">=5.0.3,<6"
plotly = ">=5.24.1,<6"
pyelftools = ">=0.31,<0.32"
bitstring = ">=4.3.0,<5"
colorama = ">=0.4.6,<0.5"
dynaconf = ">=3.2.7,<4"
altair = ">=5.5.0,<6"
streamlit = ">=1.42.0,<2"
pygments = ">=2.19.1,<3"
icontract = ">=2.7.1,<3"
hypothesis = ">=6.129.3,<7"
seaborn = ">=0.13.2,<0.14"
pandas = ">=2.2.3,<3"
scikit-learn = ">=1.6.1,<2"
pip = ">=25.1.1,<26"
pillow = ">=11.2.1,<12"
pytest = ">=8.4.1,<9"
pycparser = ">=2.22,<3"
ruff = ">=0.14.14,<0.15"
pre-commit = ">=4.5.1,<5"

[pypi-dependencies]
lief = "==0.16.6"
tabulate = ">=0.10.0"
pyqt5 = ">=5.15.11, <6"
dearpygui = ">=2.0.0, <3"
alive-progress = ">=3.2.0, <4"
claripy = ">=9.2.65, <10"
deal = ">=4.24.5, <5"
emlearn = ">=0.21.2, <0.22"
faultflipper = { path = ".", editable = true }
angr = ">=9.2.65, <10"


[tasks]
cli = "python src/faultflipper/cli.py"
run = "python src/faultflipper/cli.py run"
test = "pytest tests"

#[feature.default]
#system-requirements = { apt = ["gcc ", 
#        "riscv64-linux-gnu-gcc", 
#        "aarch64-linux-gnu-gcc", 
#        "arm-linux-gnueabi-gcc"]}

#[tool.pixi.scripts]

# ALL ruff stuff .....
[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src", "tests"]
include = ["pyproject.toml", "src/**/*.py", "tests/**/*.py", "scripts/**/*.py"]

[tool.ruff.lint]
# Defaults: E/F (pycodestyle/pyflakes), I (isort), UP (pyupgrade),
# B (bugbear), SIM (simplify), C4 (comprehensions), Q (quotes), PL (pylint-lite), RUF (extra rules), D (docstrings)
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "Q", "PL", "RUF", "D"]
ignore = ["E501", "C901", "PLR0915", "PLR0912", "PLR0913", "PLR0917"]  # let the formatter manage line length
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR2004", "D"]  # magic numbers in tests are fine

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.pydocstyle]
convention = "numpy"


